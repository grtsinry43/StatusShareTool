name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-core:
    name: Check & Test Core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Cargo check (core)
        run: cargo check -p statusshare-core

      - name: Cargo test (core)
        run: cargo test -p statusshare-core

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build staticlib (arm64)
        run: cargo build -p statusshare-core --release --target aarch64-apple-darwin

      - name: Build staticlib (x86_64)
        run: cargo build -p statusshare-core --release --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p target/release
          lipo -create \
            target/aarch64-apple-darwin/release/libstatusshare_core.a \
            target/x86_64-apple-darwin/release/libstatusshare_core.a \
            -output target/release/libstatusshare_core.a

      - name: Generate Swift bindings
        run: |
          cargo build -p statusshare-core --release
          cargo run -p statusshare-core --bin uniffi-bindgen -- generate \
            --library target/release/libstatusshare_core.dylib \
            --language swift \
            --out-dir apps/macos-swiftui/Generated

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: apps/macos-swiftui
        run: xcodegen generate

      - name: Build with xcodebuild
        working-directory: apps/macos-swiftui
        run: |
          xcodebuild build \
            -project StatusShareMac.xcodeproj \
            -scheme StatusShareMac \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build native DLL
        run: cargo build -p windows-pinvoke --release

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build WPF application
        working-directory: apps/windows-wpf/StatusShare.Wpf
        run: dotnet publish -c Release -r win-x64 --self-contained

  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libglib2.0-dev libdbus-1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build Linux GTK application
        run: cargo build -p statussharetool --release
