name: StatusShareMac
options:
  bundleIdPrefix: com.grtsinry43
settings:
  base:
    SWIFT_VERSION: 6.0
targets:
  StatusShareMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - StatusShareMac
      - path: Generated/statusshare_core.swift
        type: file
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grtsinry43.statussharetool
        PRODUCT_NAME: StatusShareMac
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_LSUIElement: false
        SWIFT_INCLUDE_PATHS: $(SRCROOT)/Generated
        LIBRARY_SEARCH_PATHS: $(SRCROOT)/../../target/release
        OTHER_LDFLAGS:
          - -lstatusshare_core
    entitlements:
      path: StatusShareMac/StatusShareMac.entitlements
